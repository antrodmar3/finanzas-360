name: Publicar Finanzas 360

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el proyecto
        uses: actions/checkout@v4
      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Compilar la aplicación
        run: npm run build
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
      - name: Preparar los archivos publicados
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
